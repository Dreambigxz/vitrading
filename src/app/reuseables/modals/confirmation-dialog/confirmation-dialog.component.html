<div class="dialog-header" *ngIf="data.title || data.message">

  <span class="dialog-title">
    {{ data.title || 'Confirm' }}
  </span>

  <span class="dialog-separator"> | </span>

  <span
    class="dialog-message"
    [innerHTML]="data.message || 'Are you sure you want to continue with this request?'">
  </span>

</div>

<div class="dialog-actions">
  <button mat-button class="btn-cancel" (click)="cancel()">NO</button>
  <button mat-flat-button color="primary" class="btn-confirm" (click)="confirm()">YES</button>
</div>
