<app-spinner></app-spinner>

<div class="section section--content">
  <div class="section__content">
    <!-- form -->
    <form [formGroup]="authService.formView.register" (ngSubmit)="authService.onSubmit(authService.formView.register,'register')" class="form form--content">
      <div class="form__logo-wrap">
        <div  class="form__logo">
          <img src="/assets/img/vi.svg" alt="">
        </div>
        <!-- <span class="form__tagline">Ventora <br> Investment</span> -->
      </div>

      <div class="form__group w-50">
        <!-- <label for=""></label> -->
        <select class="notranslate form__select lang" (change)="quickNav.changeLanguage($event)">
          <option disabled='disabled' selected='selected'>Change language </option>
          <option  *ngFor="let lang of quickNav.langKeys" [value]="lang">
                {{ lang }}
              </option>
        </select>
      </div>

      <div class="form__group">
        <input  formControlName="username" type="text" class="form__input" placeholder="Nick Name">
      </div>

      <div class="form__group">
        <input formControlName="email" type="email" class="form__input" placeholder="Email">
      </div>

      <div class="form__group">
        <input formControlName="RefCode" type="text" class="form__input" placeholder="Invite code">
      </div>

        <!-- <div class=""> -->


        <div class="form__group password-field">
          <input
            formControlName="password"
            [type]="authService.showPassword ? 'text' : 'password'"
            class="form__input"
            placeholder="Password">
          <button
            type="button"
            class="eye-toggle"
            (click)="authService.togglePassword()"
            aria-label="Toggle password visibility"
          >
            <i class="fa" [ngClass]="authService.showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>

          <div class="error" *ngIf="authService.formView.register.get('password')?.touched
              && authService.formView.register.get('password')?.errors?.['minlength']">
              Password must be at least 6 characters
            </div>
        </div>

        <!-- </div> -->


        <!-- <div class=""> -->
          <div class="form__group password-field">
            <input
              formControlName="confirm_password"
              [type]="authService.showPassword ? 'text' : 'password'"
              class="form__input"
              placeholder="Confirm Password">
            <button
              type="button"
              class="eye-toggle"
              (click)="authService.togglePassword()"
              aria-label="Toggle password visibility"
            >
              <i class="fa" [ngClass]="authService.showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>

            <div class="error" *ngIf="authService.formView.register.errors?.['passwordMismatch']
              && authService.formView.register.get('confirm_password')?.touched">
              Passwords do not match
            </div>
          </div>
      <!-- </div> -->

      <!-- <div class="form__group form__group--checkbox">
        <input id="remember" name="remember" type="checkbox">
        <label for="remember">I agree to the <a href="#">Privacy Policy</a></label>
      </div> -->

      <button class="form__btn" type="submit" [disabled]="authService.formView.register.invalid">Sign up</button>


      <span class="form__text form__text--center">Already have an account? <a (click)="authService.router.navigate(['/login'])" >Sign in!</a></span>

      <!-- design elements -->
      <span class="block-icon block-icon--purple">
        <i class="ti ti-logout"></i>
      </span>
      <span class="screw screw--big-tr"></span>
      <span class="screw screw--big-bl"></span>
      <span class="screw screw--big-br"></span>
    </form>
    <!-- end form -->
  </div>

  <!-- animation background -->
  <div class="section__canvas section__canvas--full section__canvas--third" id="canvas3"></div>
</div>
